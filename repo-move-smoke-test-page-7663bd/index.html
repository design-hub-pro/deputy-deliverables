<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Move Smoke Test</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(34, 197, 94, 0.12);
      color: var(--accent);
      border: 1px solid rgba(34, 197, 94, 0.4);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 1.5rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }
    h1 {
      font-size: 1.9rem;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    h1 .highlight { color: var(--accent); }
    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .meta {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span>Smoke Test Passed</span>
    <h1>The deliverables repo move <span class="highlight">works</span>. ✅</h1>
    <p>This self-contained page confirms that files served from the relocated deliverables repository load and render correctly.</p>
    <div class="meta">Static HTML &middot; Inline CSS &middot; No external dependencies</div>
  </main>
</body>
</html>
